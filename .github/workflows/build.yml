name: Build Echoless

on:
  push:
    branches: [main, dev]
    tags: ['v*']  # 打 v* tag 触发 release job,发布 GitHub Release
  workflow_dispatch:

permissions:
  contents: read

env:
  # 35b116d:v1.4-AEC 支持(旧 runtime 载 v1.4 返回 null);ggml 静态链入,dylib 自包含
  LOCALVQE_REF: 35b116d5eb059d552fa46fac3ce2963ed13ce153
  LOCALVQE_MODEL_REVISION: 29ca38495cba9d6393a92a4dd890f28dd81f758d

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            package: windows
          - name: macOS
            os: macos-latest
            package: macos

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust stable
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy rustfmt
          rustc --version
          cargo --version

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install pnpm
        shell: bash
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      # 缓存 ~/.cargo + 三个 workspace 的 target;冷编→热编,Windows 提速最明显。
      - name: Cache Rust build
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: |
            .
            aec3
            app/src-tauri

      # 装预编译二进制,不再从源码编 cargo-audit(Windows 上原本 ~6min → 数秒)。
      - name: Install cargo-audit
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-audit@0.22.2

      - name: Rust fmt
        shell: bash
        run: |
          set -euo pipefail
          # --all 覆盖全部 workspace 成员(含 echoless-paths,此前逐 -p 漏掉;审计 T-04)。
          cargo fmt --all --check
          (cd app/src-tauri && cargo fmt --check)
          (cd aec3 && cargo fmt --all --check)

      - name: Test
        run: cargo test --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: AEC3 tests
        working-directory: aec3
        # 全 workspace(此前只 apm/core,ns/agc2/fft/simd/common-audio 的
        # 329 个数值内核测试从不在 CI 运行;审计 T-01)。
        run: cargo test --workspace --locked

      - name: AEC3 clippy
        working-directory: aec3
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build release
        run: cargo build --release --workspace --locked

      - name: Prepare Tauri sidecar assets
        working-directory: app
        run: pnpm prepare:tauri-assets

      - name: Tauri backend clippy
        working-directory: app/src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Tauri backend build
        working-directory: app/src-tauri
        run: cargo build --locked

      - name: Frontend typecheck
        working-directory: app
        run: pnpm exec tsc --noEmit

      - name: Frontend tests
        working-directory: app
        run: pnpm test

      - name: Tauri build smoke
        working-directory: app
        run: pnpm tauri build --debug --no-bundle --ci

      - name: Cargo audit
        shell: bash
        run: |
          set -euo pipefail
          cargo audit
          # app/src-tauri 的 ignore 均为 tauri v2 锁死的传递依赖,等上游升级后移除:
          #   RUSTSEC-2024-0429  glib 0.18(VariantStrIter unsound;仅 Linux 目标编译)
          #   RUSTSEC-2026-0186  memmap2 0.5.10(linicon 托盘图标链;仅 Linux)
          #   RUSTSEC-2026-0194/0195  quick-xml 0.39(解析 DoS,非 Linux 专属;
          #     补丁在 0.41,tauri 系 pin ^0.39,无法本地升级)
          (cd app/src-tauri && cargo audit \
            --ignore RUSTSEC-2024-0429 \
            --ignore RUSTSEC-2026-0186 \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195)
          (cd aec3 && cargo audit)

      - name: LocalVQE C API regression
        shell: bash
        run: |
          set -euo pipefail
          cmake --version
          localvqe_src="${RUNNER_TEMP}/LocalVQE"
          shared_build="${RUNNER_TEMP}/localvqe-shared-build"
          regression_build="${RUNNER_TEMP}/localvqe-regression-build"
          git clone --no-checkout https://github.com/localai-org/LocalVQE.git "${localvqe_src}"
          git -C "${localvqe_src}" checkout "${LOCALVQE_REF}"
          git -C "${localvqe_src}" submodule update --init --recursive

          # Upstream regression assets point at HuggingFace main, which can drift
          # independently of the pinned LocalVQE source revision. Echoless already
          # pins and verifies these GGUF files at this HF revision.
          sed -i.bak \
            "s|https://huggingface.co/LocalAI-io/LocalVQE/resolve/main/|https://huggingface.co/LocalAI-io/LocalVQE/resolve/${LOCALVQE_MODEL_REVISION}/|g" \
            "${localvqe_src}/ggml/CMakeLists.txt"

          # Upstream test helpers currently miss the Windows S_ISREG aliases.
          # Keep this as a CI-local compatibility shim until upstream fixes it.
          helper="${localvqe_src}/ggml/tests/test_helpers.h"
          helper_tmp="${RUNNER_TEMP}/test_helpers.h"
          awk '
            {
              print
              if ($0 == "#include <sys/stat.h>") {
                print ""
                print "#ifndef S_IFMT"
                print "#define S_IFMT _S_IFMT"
                print "#endif"
                print "#ifndef S_IFREG"
                print "#define S_IFREG _S_IFREG"
                print "#endif"
                print "#ifndef S_ISREG"
                print "#define S_ISREG(m) (((m) & S_IFMT) == S_IFREG)"
                print "#endif"
              }
            }
          ' "${helper}" > "${helper_tmp}"
          mv "${helper_tmp}" "${helper}"

          cmake -S "${localvqe_src}/ggml" \
            -B "${shared_build}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DLOCALVQE_BUILD_SHARED=ON
          cmake --build "${shared_build}" \
            --config Release \
            --target localvqe_shared

          cmake -S "${localvqe_src}/ggml" \
            -B "${regression_build}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-DLOCALVQE_BUILD"
          cmake --build "${regression_build}" \
            --config Release \
            --target test_regression regression-assets
          # v1.4(DAF 自适应前端)的上游数值回归在虚拟化 runner 上超容差
          # (max diff ~0.28,v1.2/v1.3 全过;真机 FFI smoke 已另行验证 v1.4 可加载
          # 可推理)—— 排除之,加载能力由下方 FFI smoke 步骤保证。
          ctest --test-dir "${regression_build}" \
            -C Release \
            -R "^regression_" \
            -E "v1\\.4" \
            --output-on-failure

      - name: LocalVQE Echoless FFI smoke
        shell: bash
        run: |
          set -euo pipefail
          shared_build="${RUNNER_TEMP}/localvqe-shared-build"
          regression_build="${RUNNER_TEMP}/localvqe-regression-build"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            shared_dir="${shared_build}/bin/Release"
            lib="${shared_dir}/localvqe.dll"
            if [[ ! -f "${lib}" ]]; then
              echo "LocalVQE DLL not found at ${lib}" >&2
              exit 1
            fi
            export PATH="${shared_dir}:${PATH}"
            lib="$(cygpath -w "${lib}")"
          else
            shared_dir="${shared_build}/bin"
            lib="$(find "${shared_build}" -name 'liblocalvqe*.dylib' -print -quit)"
            if [[ -z "${lib}" || ! -f "${lib}" ]]; then
              echo "LocalVQE dylib not found under ${shared_build}" >&2
              exit 1
            fi
            export DYLD_LIBRARY_PATH="${shared_dir}:${DYLD_LIBRARY_PATH:-}"
            export DYLD_FALLBACK_LIBRARY_PATH="${shared_dir}:${DYLD_FALLBACK_LIBRARY_PATH:-}"
          fi

          for model_name in \
            "localvqe-v1.3-4.8M-f32.gguf" \
            "localvqe-v1.4-aec-200K-f32.gguf"; do
            model="${regression_build}/bench_assets/${model_name}"
            if [[ ! -f "${model}" ]]; then
              model="$(find "${regression_build}" -name "${model_name}" -print -quit)"
            fi
            if [[ -z "${model}" || ! -f "${model}" ]]; then
              echo "LocalVQE smoke model not found under ${regression_build}: ${model_name}" >&2
              exit 1
            fi
            if [[ "${RUNNER_OS}" == "Windows" ]]; then
              model="$(cygpath -w "${model}")"
            fi
            ECHOLESS_LOCALVQE_LIBRARY="${lib}" \
            ECHOLESS_LOCALVQE_MODEL="${model}" \
              cargo test -p echoless-processors localvqe_ffi_smoke -- --ignored --nocapture
          done

      # native runtime 随包分发(2026-07-05 定案;模型不随包,走 HF 下载)
      - name: Prepare Tauri LocalVQE native runtime
        shell: bash
        working-directory: app
        run: |
          set -euo pipefail
          shared_build="${RUNNER_TEMP}/localvqe-shared-build"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            lib="${shared_build}/bin/Release/localvqe.dll"
            if [[ ! -f "${lib}" ]]; then
              echo "LocalVQE DLL not found at ${lib}" >&2
              exit 1
            fi
            lib="$(cygpath -w "${lib}")"
          else
            lib="$(find "${shared_build}" -name 'liblocalvqe*.dylib' -print -quit)"
            if [[ -z "${lib}" || ! -f "${lib}" ]]; then
              echo "LocalVQE dylib not found under ${shared_build}" >&2
              exit 1
            fi
          fi

          ECHOLESS_LOCALVQE_LIBRARY="${lib}" \
            pnpm prepare:tauri-assets --skip-cli-build --require-localvqe-assets --require-helper-assets

      - name: Tauri bundle asset-presence smoke
        shell: bash
        working-directory: app
        run: |
          set -euo pipefail
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            pnpm tauri build --debug --ci --bundles app,dmg
            pnpm smoke:tauri-bundle
          else
            pnpm tauri build --debug --ci --bundles nsis
            pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/smoke-windows-installed-app.ps1
          fi

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          # 许可证随 CLI 包分发(审计 D-03):MIT + AEC3 BSD-3 + 第三方汇总。
          cp LICENSE dist/LICENSE.txt
          cp aec3/LICENSE dist/AEC3-LICENSE.txt
          cp THIRD-PARTY-LICENSES.md dist/
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            cp target/release/echoless.exe dist/
            cp configs/example.toml dist/
            powershell -NoLogo -NoProfile -Command \
              "Compress-Archive -Path dist/* -DestinationPath echoless-${{ matrix.package }}-${{ runner.arch }}.zip -Force"
          else
            cp target/release/echoless dist/
            cp configs/example.toml dist/
            tar -czf "echoless-${{ matrix.package }}-${{ runner.arch }}.tar.gz" -C dist .
          fi

      - name: Packaged macOS CLI smoke
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          package="echoless-${{ matrix.package }}-${{ runner.arch }}.tar.gz"
          smoke_dir="${RUNNER_TEMP}/echoless-package-smoke"
          rm -rf "${smoke_dir}"
          mkdir -p "${smoke_dir}"
          tar -xzf "${package}" -C "${smoke_dir}"
          cd "${smoke_dir}"
          ./echoless processors

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: echoless-${{ matrix.package }}-${{ runner.arch }}
          path: |
            echoless-${{ matrix.package }}-${{ runner.arch }}.zip
            echoless-${{ matrix.package }}-${{ runner.arch }}.tar.gz
            app/src-tauri/target/debug/bundle/dmg/*.dmg
            app/src-tauri/target/debug/bundle/nsis/*.exe
            app/src-tauri/target/debug/bundle/msi/*.msi
          if-no-files-found: error

      # 仅 tag 时:用 release 模式重建 GUI 安装包(上面的 smoke 是 debug 包)。
      # sidecar 与 LocalVQE runtime 资产已在前面步骤暂存,release 打包直接复用。
      - name: Build release bundle
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            pnpm tauri build --ci --bundles app,dmg
          else
            pnpm tauri build --ci --bundles nsis
          fi

      - name: Stage release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            cp "echoless-${{ matrix.package }}-${{ runner.arch }}.tar.gz" release-assets/
            cp app/src-tauri/target/release/bundle/dmg/*.dmg release-assets/
          else
            cp "echoless-${{ matrix.package }}-${{ runner.arch }}.zip" release-assets/
            cp app/src-tauri/target/release/bundle/nsis/*.exe release-assets/
          fi

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ matrix.package }}-${{ runner.arch }}
          path: release-assets/*
          if-no-files-found: error

  linux:
    name: Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Linux packaging dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev

      - name: Install Rust stable
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy rustfmt
          rustc --version
          cargo --version

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install pnpm
        shell: bash
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      # 缓存 ~/.cargo + 三个 workspace 的 target(与 build job 一致)。
      - name: Cache Rust build
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: |
            .
            aec3
            app/src-tauri

      # Linux 独有代码路径(null-sink / pactl / monitor 映射 / beep 播放)此前
      # 无任何质量门,带 #[cfg(target_os="linux")] 的测试在别的平台被条件编译
      # 掉、等于从没跑过(审计 T-03)。与 win/mac matrix 对齐 test/clippy。
      - name: Test
        run: cargo test --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build Rust workspace
        run: cargo build --release --workspace --locked

      - name: Build LocalVQE Linux native runtime
        id: localvqe_native
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          cmake --version
          localvqe_src="${RUNNER_TEMP}/LocalVQE"
          shared_build="${RUNNER_TEMP}/localvqe-shared-build"
          git clone --no-checkout https://github.com/localai-org/LocalVQE.git "${localvqe_src}"
          git -C "${localvqe_src}" checkout "${LOCALVQE_REF}"
          git -C "${localvqe_src}" submodule update --init --recursive

          cmake -S "${localvqe_src}/ggml" \
            -B "${shared_build}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DLOCALVQE_BUILD_SHARED=ON
          cmake --build "${shared_build}" \
            --config Release \
            --target localvqe_shared

          lib="$(find "${shared_build}" -name 'liblocalvqe*.so*' -print -quit)"
          if [[ -z "${lib}" || ! -f "${lib}" ]]; then
            echo "LocalVQE shared library not found under ${shared_build}" >&2
            exit 1
          fi
          echo "library=${lib}" >> "${GITHUB_OUTPUT}"

      - name: Summarize LocalVQE Linux native fallback
        if: steps.localvqe_native.outcome != 'success'
        shell: bash
        run: |
          {
            echo "### LocalVQE Linux native runtime"
            echo ""
            echo "Building upstream LocalVQE failed on ubuntu-latest. The Linux bundle build continues without requiring the native runtime asset."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Prepare Tauri LocalVQE native runtime
        if: steps.localvqe_native.outcome == 'success'
        working-directory: app
        env:
          ECHOLESS_LOCALVQE_LIBRARY: ${{ steps.localvqe_native.outputs.library }}
        run: pnpm prepare:tauri-assets --skip-cli-build --require-localvqe-assets

      - name: Tauri Linux bundle
        working-directory: app
        run: pnpm tauri build --ci --bundles deb,appimage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: echoless-linux-${{ runner.arch }}
          path: |
            target/release/echoless
            app/src-tauri/target/release/bundle/deb/*.deb
            app/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      # 仅 tag 时:deb/appimage 已是 release 构建,连同 CLI tarball 一并作为 release 资产。
      - name: Stage release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets dist
          # CLI tarball,许可证随包(与 Windows/macOS 的 Package 步骤一致)。
          cp target/release/echoless dist/
          cp configs/example.toml dist/
          cp LICENSE dist/LICENSE.txt
          cp aec3/LICENSE dist/AEC3-LICENSE.txt
          cp THIRD-PARTY-LICENSES.md dist/
          tar -czf "release-assets/echoless-linux-${{ runner.arch }}.tar.gz" -C dist .
          cp app/src-tauri/target/release/bundle/deb/*.deb release-assets/
          cp app/src-tauri/target/release/bundle/appimage/*.AppImage release-assets/

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-linux-${{ runner.arch }}
          path: release-assets/*
          if-no-files-found: error

  # 打 v* tag 时,收集三平台的 release 资产并发布为公开 GitHub Release。
  release:
    name: Publish release
    needs: [build, linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: List collected assets
        shell: bash
        run: ls -la release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
