name: Build Echoless

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  LOCALVQE_REF: de56a174d9662b65f404ec65ae8e4bc9712db0da
  LOCALVQE_MODEL_REVISION: 5760d09ce556750f76c1251c024e4a8c37231591

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            package: windows
          - name: macOS
            os: macos-latest
            package: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy rustfmt
          rustc --version
          cargo --version

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        shell: bash
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Rust fmt
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt \
            -p echoless-audio-io \
            -p echoless-processors \
            -p echoless-core \
            -p echoless-cli \
            --check
          (cd app/src-tauri && cargo fmt --check)

      - name: Test
        run: cargo test --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: AEC3 tests
        working-directory: vendor/aec3
        run: cargo test -p aec3-apm -p aec3-core --locked

      - name: AEC3 clippy
        working-directory: vendor/aec3
        run: cargo clippy -p aec3-apm -p aec3-core --all-targets --locked -- -D warnings

      - name: Build release
        run: cargo build --release --workspace --locked

      - name: Prepare Tauri sidecar assets
        working-directory: app
        run: pnpm prepare:tauri-assets

      - name: Tauri backend clippy
        working-directory: app/src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Tauri backend build
        working-directory: app/src-tauri
        run: cargo build --locked

      - name: Frontend typecheck
        working-directory: app
        run: pnpm exec tsc --noEmit

      - name: Tauri build smoke
        working-directory: app
        run: pnpm tauri build --debug --no-bundle --ci

      - name: Cargo audit
        shell: bash
        run: |
          set -euo pipefail
          cargo audit
          (cd app/src-tauri && cargo audit)
          (cd vendor/aec3 && cargo audit)

      - name: LocalVQE C API regression
        shell: bash
        run: |
          set -euo pipefail
          cmake --version
          localvqe_src="${RUNNER_TEMP}/LocalVQE"
          shared_build="${RUNNER_TEMP}/localvqe-shared-build"
          regression_build="${RUNNER_TEMP}/localvqe-regression-build"
          git clone --no-checkout https://github.com/localai-org/LocalVQE.git "${localvqe_src}"
          git -C "${localvqe_src}" checkout "${LOCALVQE_REF}"
          git -C "${localvqe_src}" submodule update --init --recursive

          # Upstream regression assets point at HuggingFace main, which can drift
          # independently of the pinned LocalVQE source revision. Echoless already
          # pins and verifies these GGUF files at this HF revision.
          sed -i.bak \
            "s|https://huggingface.co/LocalAI-io/LocalVQE/resolve/main/|https://huggingface.co/LocalAI-io/LocalVQE/resolve/${LOCALVQE_MODEL_REVISION}/|g" \
            "${localvqe_src}/ggml/CMakeLists.txt"

          # Upstream test helpers currently miss the Windows S_ISREG aliases.
          # Keep this as a CI-local compatibility shim until upstream fixes it.
          helper="${localvqe_src}/ggml/tests/test_helpers.h"
          helper_tmp="${RUNNER_TEMP}/test_helpers.h"
          awk '
            {
              print
              if ($0 == "#include <sys/stat.h>") {
                print ""
                print "#ifndef S_IFMT"
                print "#define S_IFMT _S_IFMT"
                print "#endif"
                print "#ifndef S_IFREG"
                print "#define S_IFREG _S_IFREG"
                print "#endif"
                print "#ifndef S_ISREG"
                print "#define S_ISREG(m) (((m) & S_IFMT) == S_IFREG)"
                print "#endif"
              }
            }
          ' "${helper}" > "${helper_tmp}"
          mv "${helper_tmp}" "${helper}"

          cmake -S "${localvqe_src}/ggml" \
            -B "${shared_build}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DLOCALVQE_BUILD_SHARED=ON
          cmake --build "${shared_build}" \
            --config Release \
            --target localvqe_shared

          cmake -S "${localvqe_src}/ggml" \
            -B "${regression_build}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-DLOCALVQE_BUILD"
          cmake --build "${regression_build}" \
            --config Release \
            --target test_regression regression-assets
          ctest --test-dir "${regression_build}" \
            -C Release \
            -R "^regression_" \
            --output-on-failure

      - name: LocalVQE Echoless FFI smoke
        shell: bash
        run: |
          set -euo pipefail
          shared_build="${RUNNER_TEMP}/localvqe-shared-build"
          regression_build="${RUNNER_TEMP}/localvqe-regression-build"
          model_name="localvqe-v1.3-4.8M-f32.gguf"
          model="${regression_build}/bench_assets/${model_name}"
          if [[ ! -f "${model}" ]]; then
            model="$(find "${regression_build}" -name "${model_name}" -print -quit)"
          fi
          if [[ -z "${model}" || ! -f "${model}" ]]; then
            echo "LocalVQE smoke model not found under ${regression_build}" >&2
            exit 1
          fi

          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            shared_dir="${shared_build}/bin/Release"
            lib="${shared_dir}/localvqe.dll"
            if [[ ! -f "${lib}" ]]; then
              echo "LocalVQE DLL not found at ${lib}" >&2
              exit 1
            fi
            export PATH="${shared_dir}:${PATH}"
            lib="$(cygpath -w "${lib}")"
            model="$(cygpath -w "${model}")"
          else
            shared_dir="${shared_build}/bin"
            lib="$(find "${shared_build}" -name 'liblocalvqe*.dylib' -print -quit)"
            if [[ -z "${lib}" || ! -f "${lib}" ]]; then
              echo "LocalVQE dylib not found under ${shared_build}" >&2
              exit 1
            fi
            export DYLD_LIBRARY_PATH="${shared_dir}:${DYLD_LIBRARY_PATH:-}"
            export DYLD_FALLBACK_LIBRARY_PATH="${shared_dir}:${DYLD_FALLBACK_LIBRARY_PATH:-}"
          fi

          ECHOLESS_LOCALVQE_LIBRARY="${lib}" \
          ECHOLESS_LOCALVQE_MODEL="${model}" \
            cargo test -p echoless-processors localvqe_ffi_smoke -- --ignored --nocapture

      - name: Prepare Tauri LocalVQE assets
        shell: bash
        working-directory: app
        run: |
          set -euo pipefail
          shared_build="${RUNNER_TEMP}/localvqe-shared-build"
          regression_build="${RUNNER_TEMP}/localvqe-regression-build"
          model_name="localvqe-v1.3-4.8M-f32.gguf"
          model="${regression_build}/bench_assets/${model_name}"
          if [[ ! -f "${model}" ]]; then
            model="$(find "${regression_build}" -name "${model_name}" -print -quit)"
          fi
          if [[ -z "${model}" || ! -f "${model}" ]]; then
            echo "LocalVQE model not found under ${regression_build}" >&2
            exit 1
          fi

          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            shared_dir="${shared_build}/bin/Release"
            lib="${shared_dir}/localvqe.dll"
            if [[ ! -f "${lib}" ]]; then
              echo "LocalVQE DLL not found at ${lib}" >&2
              exit 1
            fi
            lib="$(cygpath -w "${lib}")"
            model="$(cygpath -w "${model}")"
          else
            lib="$(find "${shared_build}" -name 'liblocalvqe*.dylib' -print -quit)"
            if [[ -z "${lib}" || ! -f "${lib}" ]]; then
              echo "LocalVQE dylib not found under ${shared_build}" >&2
              exit 1
            fi
          fi

          ECHOLESS_LOCALVQE_LIBRARY="${lib}" \
          ECHOLESS_LOCALVQE_MODEL="${model}" \
            pnpm prepare:tauri-assets --skip-cli-build --require-localvqe-assets

      - name: Tauri bundle smoke
        shell: bash
        working-directory: app
        run: |
          set -euo pipefail
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            pnpm tauri build --debug --ci --bundles app,dmg
            pnpm smoke:tauri-bundle
          else
            pnpm tauri build --debug --ci --bundles nsis
            pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/smoke-windows-installed-app.ps1
          fi

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          shared_build="${RUNNER_TEMP}/localvqe-shared-build"
          regression_build="${RUNNER_TEMP}/localvqe-regression-build"
          model_name="localvqe-v1.3-4.8M-f32.gguf"
          model="${regression_build}/bench_assets/${model_name}"
          if [[ ! -f "${model}" ]]; then
            model="$(find "${regression_build}" -name "${model_name}" -print -quit)"
          fi
          if [[ -z "${model}" || ! -f "${model}" ]]; then
            echo "LocalVQE model not found under ${regression_build}" >&2
            exit 1
          fi

          mkdir -p dist/models
          cp "${model}" dist/models/
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            shared_dir="${shared_build}/bin/Release"
            cp target/release/echoless.exe dist/
            cp configs/example.toml dist/
            cp "${shared_dir}"/*.dll dist/
            powershell -NoLogo -NoProfile -Command \
              "Compress-Archive -Path dist/* -DestinationPath echoless-${{ matrix.package }}-${{ runner.arch }}.zip -Force"
          else
            cp target/release/echoless dist/
            cp configs/example.toml dist/
            find "${shared_build}" \( -name '*.dylib' -o -name '*.so' \) -exec cp -P {} dist/ \;
            tar -czf "echoless-${{ matrix.package }}-${{ runner.arch }}.tar.gz" -C dist .
          fi

      - name: Packaged macOS LocalVQE smoke
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          package="echoless-${{ matrix.package }}-${{ runner.arch }}.tar.gz"
          smoke_dir="${RUNNER_TEMP}/echoless-package-smoke"
          rm -rf "${smoke_dir}"
          mkdir -p "${smoke_dir}"
          tar -xzf "${package}" -C "${smoke_dir}"

          python3 - <<'PY'
          import math
          import struct
          import wave

          rate = 48000
          seconds = 2
          frames = rate * seconds
          reference = []
          mic = []
          for n in range(frames):
              t = n / rate
              far = 0.20 * math.sin(2 * math.pi * 440 * t)
              near = 0.08 * math.sin(2 * math.pi * 180 * t) if 0.55 <= t <= 1.55 else 0.0
              delayed = reference[n - 960] * 0.35 if n >= 960 else 0.0
              reference.append(far)
              mic.append(max(-1.0, min(1.0, near + delayed)))

          for name, data in (("smoke_ref.wav", reference), ("smoke_mic.wav", mic)):
              with wave.open(name, "wb") as wav:
                  wav.setnchannels(1)
                  wav.setsampwidth(2)
                  wav.setframerate(rate)
                  wav.writeframes(
                      b"".join(
                          struct.pack("<h", int(max(-1.0, min(1.0, sample)) * 32767))
                          for sample in data
                      )
                  )
          PY

          cat > "${smoke_dir}/localvqe-smoke.toml" <<'TOML'
          mic = "smoke_mic.wav"
          reference = "smoke_ref.wav"
          output = "smoke_localvqe_out.wav"
          sample_rate = 48000
          frame_ms = 10
          reference_channels = "mono"

          [[chain]]
          kind = "localvqe"
          model = "models/localvqe-v1.3-4.8M-f32.gguf"
          library = "./liblocalvqe.0.1.0.dylib"
          threads = 2
          noise_gate = false
          TOML

          mv smoke_mic.wav smoke_ref.wav "${smoke_dir}/"
          cd "${smoke_dir}"
          ./echoless processors
          DYLD_LIBRARY_PATH="${PWD}:${DYLD_LIBRARY_PATH:-}" \
          DYLD_FALLBACK_LIBRARY_PATH="${PWD}:${DYLD_FALLBACK_LIBRARY_PATH:-}" \
            ./echoless offline \
              --config localvqe-smoke.toml \
              --mic smoke_mic.wav \
              --reference smoke_ref.wav \
              --out smoke_localvqe_out.wav
          test -s smoke_localvqe_out.wav

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: echoless-${{ matrix.package }}-${{ runner.arch }}
          path: |
            echoless-${{ matrix.package }}-${{ runner.arch }}.zip
            echoless-${{ matrix.package }}-${{ runner.arch }}.tar.gz
            app/src-tauri/target/debug/bundle/dmg/*.dmg
            app/src-tauri/target/debug/bundle/nsis/*.exe
            app/src-tauri/target/debug/bundle/msi/*.msi
          if-no-files-found: error
