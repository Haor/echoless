<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ECHOLESS — ICON PROPOSALS</title>
<style>
  :root {
    --bg: #141412; --raised: #1d1d1b; --line: #35352f;
    --t-strong: #d6d5cd; --t: #c2c1b8; --t-soft: #98978e; --t-mut: #767570;
    --acc: #ff7235; --paper: #c9c9c3; --ink: #171715;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 48px 40px 96px;
    background: var(--bg); color: var(--t);
    font: 13px/1.6 "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  header { max-width: 1280px; margin: 0 auto 8px; }
  h1 {
    font-size: 20px; letter-spacing: 4px; color: var(--t-strong);
    text-transform: uppercase; margin: 0 0 4px;
  }
  h1 .no { color: var(--acc); }
  .sub { color: var(--t-mut); letter-spacing: 1px; margin: 0 0 28px; }
  .controls {
    max-width: 1280px; margin: 0 auto 28px; display: flex; gap: 10px; align-items: center;
    color: var(--t-mut); letter-spacing: 1.5px; text-transform: uppercase; font-size: 11px;
  }
  .controls button {
    font: inherit; letter-spacing: 1.5px; text-transform: uppercase;
    background: transparent; color: var(--t-soft);
    border: 1px solid var(--line); padding: 6px 14px; cursor: pointer;
  }
  .controls button.active { color: var(--ink); background: var(--paper); border-color: var(--paper); }
  .group { max-width: 1280px; margin: 0 auto; }
  .gtitle {
    margin: 44px 0 16px; padding-top: 16px; border-top: 1px solid var(--line);
    color: var(--t-soft); letter-spacing: 3px; text-transform: uppercase; font-size: 12px;
  }
  .gtitle .no { color: var(--acc); margin-right: 10px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(288px, 1fr)); gap: 18px; }
  .card { border: 1px solid var(--line); background: var(--raised); padding: 16px; }
  .dock {
    display: flex; align-items: center; justify-content: center; gap: 18px;
    padding: 20px 12px; margin-bottom: 14px; background: #0e0e0d; transition: background .2s;
  }
  body[data-dock="light"] .dock { background: #ececea; }
  body[data-dock="desk"]  .dock { background: linear-gradient(135deg, #46587c 0%, #23283a 60%, #191a22 100%); }
  .dock .lg { width: 128px; height: 128px; }
  .dock .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .dock .s64 { width: 64px; height: 64px; }
  .dock .s32 { width: 32px; height: 32px; }
  .dock .s16 { width: 16px; height: 16px; }
  .dock svg { display: block; width: 100%; height: 100%; }
  .cid { color: var(--acc); letter-spacing: 2px; font-size: 11px; }
  .cname { color: var(--t-strong); letter-spacing: 1.5px; text-transform: uppercase; margin: 2px 0 6px; }
  .cnote { color: var(--t-mut); font-size: 12px; line-height: 1.55; }
  .tag {
    display: inline-block; margin-top: 10px; margin-right: 6px;
    border: 1px solid var(--line); color: var(--t-mut);
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 8px;
  }
  .tag.hot { color: var(--acc); border-color: rgba(255,114,53,.4); }
  footer { max-width: 1280px; margin: 64px auto 0; color: var(--t-mut); border-top: 1px solid var(--line); padding-top: 16px; }
</style>
</head>
<body data-dock="dark">
<header>
  <h1>ECHOLESS <span class="no">/</span> ICON PROPOSALS</h1>
  <p class="sub">44 个方向 · 同一主题语汇(炭黑 #1d1d1b · 纸灰 #d6d5cd · 橙 #ff7235)· 每卡含 128 / 64 / 32 / 16 px。选中报编号即可。</p>
</header>
<div class="controls">
  dock 背景
  <button data-dock="dark" class="active">炭黑</button>
  <button data-dock="light">浅色</button>
  <button data-dock="desk">桌面</button>
</div>
<div id="root"></div>
<footer>A1 = 当前线上版本。所有图形按 1024 视区绘制,母版脚本在 <code>app/scripts/gen-icon.py</code>;定稿后我把选中方向落回脚本并重出全套尺寸。</footer>

<script>
const ACC = "#ff7235", PAPER = "#d6d5cd", BG = "#1d1d1b", LINE = "#35352f", INK = "#171715", PAPBG = "#c9c9c3";
let uidc = 0;

const plate = (fill = BG, stroke = LINE) =>
  `<rect x="100" y="100" width="824" height="824" rx="224" fill="${fill}" stroke="${stroke}" stroke-width="6"/>`;

const bar = (x, cy, w, h, fill, op) =>
  `<rect x="${x}" y="${cy - h / 2}" width="${w}" height="${h}" rx="${w / 2}" fill="${fill}"${op != null ? ` fill-opacity="${op}"` : ""}/>`;

// A1 几何:首杠橙,回声纸灰渐隐(gap1 拉开信号|回声两组)
const decayBars = (first = ACC, echo = PAPER, ops = [0.9, 0.63, 0.39, 0.23]) => {
  const xs = [162, 338, 482, 626, 770], hs = [527, 346, 231, 148, 92];
  let s = bar(xs[0], 512, 92, hs[0], first);
  for (let i = 1; i < 5; i++) s += bar(xs[i], 512, 92, hs[i], echo, ops[i - 1]);
  return s;
};

// ---- Op-Art 条纹球工具(参考稿:条纹构成圆球,图形从缺口里浮现) ----
const OFFW = "#ecebe4", OFFL = "#c9c8c0", INKD = "#1f1f1d";
const rk = (x, y, w, h, f = INKD, op) =>
  `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" fill="${f}"${op != null ? ` fill-opacity="${op}"` : ""}/>`;

// 竖杠滚花球:外圆内全高杠,内圆区域收细成连杆(参考图 1)
const knurl = (uid, ink, accIdx = -1, acc = ACC) => {
  const R = 340, Rin = 205, bw = 42, pitch = 66, cx = 512, cy = 512;
  let s = "";
  for (let k = -5; k <= 5; k++) {
    const x = cx + k * pitch, dx = Math.abs(x - cx);
    if (dx > R - 8) continue;
    const f = k + 5 === accIdx ? acc : ink;
    if (dx < Rin - 4) {
      const vi = Math.sqrt(Rin * Rin - dx * dx);
      s += rk(x - bw / 2, cy - R, bw, R - vi, f);
      s += rk(x - bw / 2, cy + vi, bw, R - vi, f);
      s += rk(x - 7, cy - vi, 14, 2 * vi, f);
    } else {
      s += rk(x - bw / 2, cy - R, bw, 2 * R, f);
    }
  }
  return `<g clip-path="url(#kc${uid})">${s}</g>` +
    `<defs><clipPath id="kc${uid}"><circle cx="512" cy="512" r="${R}"/></clipPath></defs>`;
};

// 横纹分层球:细条 = 外圆弦宽,粗条 = 内形弦宽(参考图 2)
const slicedSphere = (innerHalfWidthAt /* dy -> 内形半宽或 null */, ink = INKD) => {
  const R = 350, pitch = 78, t = 26, T = 62, cx = 512, cy = 512;
  let s = "";
  for (let k = -4; k <= 4; k++) {
    const y = cy + k * pitch, dy = Math.abs(y - cy);
    if (dy > R - 10) continue;
    const wo = Math.sqrt(R * R - dy * dy);
    s += rk(cx - wo, y - t / 2, 2 * wo, t, ink);
    const wi = innerHalfWidthAt(k * pitch);
    if (wi) s += rk(cx - wi, y - T / 2, 2 * wi, T, ink);
  }
  return s;
};

const VARIANTS = [
{ group: "★ · OP-ART 条纹球 — 你给的参考方向", items: [
  { id: "E1", name: "滚花栅格球", tags: ["参考直译", "旋钮质感"], note: "参考图 1 的直译:竖杠成球,内圆收细成连杆 —— 像一颗滚花旋钮,也像麦克风防风网。纯图形,不讲故事。",
    draw: (uid) => plate(OFFW, OFFL) + knurl(uid, INKD) },
  { id: "E2", name: "分层球", tags: ["参考直译"], note: "参考图 2 的直译:横纹球体,内层球从条纹增厚处浮现。图底反转的经典配方,远看是球,近看全是条。",
    draw: () => {
      const Rin = 235;
      return plate(OFFW, OFFL) + slicedSphere(dy => Math.abs(dy) < Rin - 4 ? Math.sqrt(Rin * Rin - dy * dy) : null);
    } },
  { id: "E3", name: "衰减球", tags: ["杂交", "本命提名"], note: "把 op-art 配方换上我们的心脏:竖细杠成球,粗段的高度沿衰减包络一路跌下去 —— 球里锁着一条正在死去的回声。",
    draw: (uid) => {
      const R = 340, pitch = 64, cx = 512, cy = 512;
      let s = "";
      for (let k = -5; k <= 5; k++) {
        const x = cx + k * pitch, dx = Math.abs(x - cx);
        if (dx > R - 8) continue;
        const vo = Math.sqrt(R * R - dx * dx);
        s += rk(x - 8, cy - vo, 16, 2 * vo);
        const H = Math.min(300 * Math.pow(0.72, k + 5), vo - 6);
        if (H > 12) s += rk(x - 22, cy - H, 44, 2 * H);
      }
      return plate(OFFW, OFFL) + `<g clip-path="url(#dc${uid})">${s}</g>` +
        `<defs><clipPath id="dc${uid}"><circle cx="512" cy="512" r="${R}"/></clipPath></defs>`;
    } },
  { id: "E4", name: "衰减球 · 橙脉冲", tags: ["杂交", "一滴橙"], note: "同 E3,但第一声是橙的:活人声进场,后面全是它逐渐熄灭的回声。品牌色只出现在唯一重要的地方。",
    draw: (uid) => {
      const R = 340, pitch = 64, cx = 512, cy = 512;
      let s = "";
      for (let k = -5; k <= 5; k++) {
        const x = cx + k * pitch, dx = Math.abs(x - cx);
        if (dx > R - 8) continue;
        const vo = Math.sqrt(R * R - dx * dx);
        const H = Math.min(300 * Math.pow(0.72, k + 5), vo - 6);
        const hot = k === -4; // 最高可见杠(k=-5 被圆裁成细条)
        s += rk(x - 8, cy - vo, 16, 2 * vo, hot ? ACC : INKD);
        if (H > 12) s += rk(x - 22, cy - H, 44, 2 * H, hot ? ACC : INKD);
      }
      return plate(OFFW, OFFL) + `<g clip-path="url(#ec${uid})">${s}</g>` +
        `<defs><clipPath id="ec${uid}"><circle cx="512" cy="512" r="${R}"/></clipPath></defs>`;
    } },
  { id: "E5", name: "残影双球", tags: ["杂交", "echo 字面义"], note: "一颗实纹球,右后方跟着一颗错半拍相位的淡纹残影 —— 回声就是错位的复读。两球相接处干净切开。",
    draw: (uid) => {
      const R = 280, pitch = 62, t = 32;
      const stripes = (cx, cy, phase, op) => {
        let s = "";
        for (let k = -4; k <= 4; k++) {
          const y = cy + k * pitch + phase, dy = Math.abs(y - cy);
          if (dy > R - 8) continue;
          const w = Math.sqrt(R * R - dy * dy);
          s += rk(cx - w, y - t / 2, 2 * w, t, INKD, op);
        }
        return s;
      };
      return plate(OFFW, OFFL) +
        `<defs><mask id="gm${uid}"><rect width="1024" height="1024" fill="black"/>` +
        `<circle cx="642" cy="512" r="${R}" fill="white"/><circle cx="422" cy="512" r="${R}" fill="black"/></mask></defs>` +
        `<g mask="url(#gm${uid})">${stripes(642, 512, 31, 0.38)}</g>` +
        stripes(422, 512, 0, null);
    } },
  { id: "E6", name: "出线球", tags: ["杂交", "叙事完整"], note: "分层球 = 塞满反射的房间;唯一走出去的,是一条干净的橙色平线。混响留在球里,人声离开。",
    draw: () => {
      const Rin = 235;
      return plate(OFFW, OFFL) +
        `<g transform="translate(442 512) scale(0.86) translate(-512 -512)">` +
        slicedSphere(dy => Math.abs(dy) < Rin - 4 ? Math.sqrt(Rin * Rin - dy * dy) : null) +
        `</g><rect x="470" y="490" width="422" height="44" rx="22" fill="${ACC}"/>`;
    } },
  { id: "E7", name: "暗面栅格", tags: ["杂交", "接现有主题"], note: "E1 翻回炭黑底:纸灰杠 + 正中一根橙杠,和 App 界面同一张脸。op-art 结构留下,配色归队。",
    draw: (uid) => plate() + knurl(uid, PAPER, 5) },
]},
{ group: "F · 碳面 × AEC 原理 — 把算法画进条纹球", items: [
  { id: "F1", name: "相消缝", tags: ["双端相消", "对称构图"], note: "远端参考和近端回声从两侧涌来,右半球条纹刻意错开半拍(反相)。两个声场相遇的正中间:一道干净的静默缝 —— 相消发生的地方什么都不剩。",
    draw: (uid) => {
      const R = 340, pitch = 72, t = 34, cx = 512, cy = 512, v = 36;
      let s = "";
      for (let k = -4; k <= 4; k++) {
        const yl = cy + k * pitch, dyl = Math.abs(yl - cy);
        if (dyl < R - 12) {
          const wo = Math.sqrt(R * R - dyl * dyl);
          if (wo > v + 20) s += rk(cx - wo, yl - t / 2, wo - v, t, PAPER);
        }
        const yr = cy + k * pitch + pitch / 2, dyr = Math.abs(yr - cy);
        if (dyr < R - 12) {
          const wo = Math.sqrt(R * R - dyr * dyr);
          if (wo > v + 20) s += rk(cx + v, yr - t / 2, wo - v, t, PAPER);
        }
      }
      return plate() + `<g clip-path="url(#f1${uid})">${s}</g>` +
        `<defs><clipPath id="f1${uid}"><circle cx="512" cy="512" r="${R}"/></clipPath></defs>`;
    } },
  { id: "F2", name: "减去残影", tags: ["e = d − ŷ", "最像论文"], note: "AEC 的核心公式画成图:条纹球是麦克风收到的一切,橙圈是滤波器估计出的回声 ŷ —— 圈到之处条纹被整块减掉,剩下的月牙就是干净人声 e。",
    draw: (uid) => {
      const R = 290, Rg = 268, gx = 672, pitch = 62, t = 30, cx = 432, cy = 512;
      let s = "";
      for (let k = -4; k <= 4; k++) {
        const y = cy + k * pitch, dy = Math.abs(y - cy);
        if (dy > R - 10) continue;
        const w = Math.sqrt(R * R - dy * dy);
        s += rk(cx - w, y - t / 2, 2 * w, t, PAPER);
      }
      return plate() +
        `<defs><mask id="f2${uid}"><rect width="1024" height="1024" fill="black"/>` +
        `<circle cx="${cx}" cy="${cy}" r="${R}" fill="white"/><circle cx="${gx}" cy="512" r="${Rg}" fill="black"/></mask>` +
        `<clipPath id="f2p${uid}"><rect x="100" y="100" width="824" height="824" rx="224"/></clipPath></defs>` +
        `<g mask="url(#f2${uid})">${s}</g>` +
        `<g clip-path="url(#f2p${uid})"><circle cx="${gx}" cy="512" r="${Rg}" fill="none" stroke="${ACC}" stroke-width="13"/></g>`;
    } },
  { id: "F3", name: "冲激响应球", tags: ["echo path", "给懂行的"], note: "球里锁的不是随便的衰减,是一条房间冲激响应:橙色直达声最高,后面两个凸起是墙面早期反射,再往后是混响长尾 —— AEC 要辨认的正是这条 h(t)。",
    draw: (uid) => {
      const R = 340, pitch = 64, cx = 512, cy = 512;
      const H = [40, 300, 150, 205, 115, 142, 76, 48, 30, 18, 10];
      let s = "";
      for (let k = -5; k <= 5; k++) {
        const x = cx + k * pitch, dx = Math.abs(x - cx);
        if (dx > R - 8) continue;
        const vo = Math.sqrt(R * R - dx * dx);
        const hot = k === -4;
        s += rk(x - 8, cy - vo, 16, 2 * vo, hot ? ACC : PAPER);
        const h = Math.min(H[k + 5], vo - 6);
        if (h > 12 && k > -5) s += rk(x - 22, cy - h, 44, 2 * h, hot ? ACC : PAPER);
      }
      return plate() + `<g clip-path="url(#f3${uid})">${s}</g>` +
        `<defs><clipPath id="f3${uid}"><circle cx="512" cy="512" r="${R}"/></clipPath></defs>`;
    } },
  { id: "F4", name: "自适应收敛", tags: ["NLMS 之魂"], note: "橙 = 滤波器估计,灰 = 真实回声。左边刚起步:两根杠明显没对上;越往右估计越贴住真相,贴住的瞬间输出归零 —— 杠也就消失了。整颗球是一次收敛过程。",
    draw: (uid) => {
      const R = 330, pitch = 62, cx = 512, cy = 512;
      let s = "";
      for (let k = -5; k <= 5; k++) {
        const i = k + 5, x = cx + k * pitch, dx = Math.abs(x - cx);
        if (dx > R - 8) continue;
        const vo = Math.sqrt(R * R - dx * dx);
        const d = 34 * Math.pow(0.62, i);
        const h = Math.min(270 * Math.pow(0.76, i), vo - 8);
        if (h < 8) continue;
        s += rk(x - d - 13, cy - h, 26, 2 * h, PAPER);
        s += rk(x + d - 13, cy - h, 26, 2 * h, ACC);
      }
      return plate() + `<g clip-path="url(#f4${uid})">${s}</g>` +
        `<defs><clipPath id="f4${uid}"><circle cx="512" cy="512" r="${R}"/></clipPath></defs>`;
    } },
  { id: "F5", name: "滤波闸门", tags: ["前 / 后对照"], note: "橙闸就是滤波器。左半球:人声条纹之间夹满暗色回声条;穿过闸门之后,夹层被扣下,只有人声条纹走了出去。",
    draw: () => {
      const R = 330, pitch = 76, t = 32, cx = 512, cy = 512, g = 54;
      let s = "";
      for (let k = -4; k <= 4; k++) {
        const y = cy + k * pitch, dy = Math.abs(y - cy);
        if (dy < R - 12) {
          const w = Math.sqrt(R * R - dy * dy);
          s += rk(cx - w, y - t / 2, w - g, t, PAPER);
          s += rk(cx + g, y - t / 2, w - g, t, PAPER);
        }
        const ye = y + pitch / 2, dye = Math.abs(ye - cy);
        if (dye < R - 12) {
          const we = Math.sqrt(R * R - dye * dye);
          s += rk(cx - we, ye - 11, we - g, 22, PAPER, 0.38);
        }
      }
      return plate() + s + `<rect x="${cx - 24}" y="150" width="48" height="724" rx="24" fill="${ACC}"/>`;
    } },
  { id: "F6", name: "衰减球 · 碳面", tags: ["E4 归队"], note: "碳面衰减球的精修版:起振一小格 → 橙色峰值(离开圆缘,不再被切头)→ 混响长尾一路衰到右缘不断气。橙杠连同它的细芯整根点亮。",
    draw: (uid) => {
      const R = 340, pitch = 64, cx = 512, cy = 512;
      // 半高包络:起振 → 峰(k=-3, 橙) → 指数长尾(抬高地板,纹理延续到右缘)
      const H = [0, 40, 260, 187, 135, 97, 70, 50, 36, 26, 19];
      let s = "";
      for (let k = -5; k <= 5; k++) {
        const x = cx + k * pitch, dx = Math.abs(x - cx);
        if (dx > R - 8) continue;
        const vo = Math.sqrt(R * R - dx * dx);
        const h = Math.min(H[k + 5], vo - 8);
        const hot = k === -3;
        s += rk(x - 8, cy - vo, 16, 2 * vo, hot ? ACC : PAPER);
        if (h > 10) s += rk(x - 22, cy - h, 44, 2 * h, hot ? ACC : PAPER);
      }
      return plate() + `<g clip-path="url(#f6${uid})">${s}</g>` +
        `<defs><clipPath id="f6${uid}"><circle cx="512" cy="512" r="${R}"/></clipPath></defs>`;
    } },
]},
{ group: "G · 字母 E — 刚好三个横", items: [
  { id: "G1", name: "条纹 E", tags: ["IBM 同宗", "字标"], note: "E 本来就是条纹字母:三条长横(臂)夹四条短横(脊),整个字母用横条纹拼出来 —— 和 IBM 八条纹标同一个祖宗。纯字标,最耐用。",
    draw: () => {
      const widths = [420, 130, 130, 372, 130, 130, 420];
      const bh = 58, gap = 34, x0 = 302;
      const y0 = (1024 - (7 * bh + 6 * gap)) / 2;
      return plate() + widths.map((w, i) => rk(x0, y0 + i * (bh + gap), w, bh, PAPER)).join("");
    } },
  { id: "G2", name: "球内浮现 E", tags: ["op-art 直系", "中横橙"], note: "参考稿配方 + 字母:横纹球体,E 从条纹的增厚处浮现,中横给橙。远看是球,近看是 E,再近看全是条纹。",
    draw: () => {
      const R = 350, pitch = 78, t = 26, T = 62, cx = 512, cy = 512, xL = cx - 190;
      let s = "";
      for (let k = -4; k <= 4; k++) {
        const y = cy + k * pitch, dy = Math.abs(y - cy);
        if (dy > R - 10) continue;
        const wo = Math.sqrt(R * R - dy * dy);
        s += rk(cx - wo, y - t / 2, 2 * wo, t, PAPER);

{ group: "I · 纹身波形 × IBM 条纹 — 右侧收敛成单线拖尾", items: (() => {
  // 尖刺包络:三角峰取 max,横条纹在包络内取段(多峰自动长出纹身的碎刺感)
  const PEAKS = [
    [238, 118, 42], [305, 312, 68], [402, 204, 58],
    [478, 126, 46], [548, 74, 40], [612, 38, 34],
  ];
  const envAt = (x) => {
    let a = 0;
    for (const [xp, h, w] of PEAKS) a = Math.max(a, h * (1 - Math.abs(x - xp) / w));
    return a;
  };
  // 条纹几何常量:pitch 44 / 条厚 26,波形区 190..668,单线拖尾到 884
  const waveTail = (stripe, line) => {
    const pitch = 44, t = 26, cy = 512, x0 = 190, x1 = 668, tail = 884;
    let s = "";
    for (let k = -7; k <= 7; k++) {
      if (k === 0) continue;
      const dy = Math.abs(k) * pitch;
      let run = null;
      for (let x = x0; x <= x1 + 2; x += 2) {
        const on = x <= x1 && envAt(x) >= dy;
        if (on && run === null) run = x;
        if (!on && run !== null) {
          if (x - run >= 8) s += rk(run, cy + k * pitch - t / 2, x - run, t, stripe);
          run = null;
        }
      }
    }
    s += rk(x0 - 14, cy - t / 2, tail - (x0 - 14), t, line);
    return s;
  };
  return [
    { id: "I1", name: "纹身波形 · 单线拖尾", tags: ["你的配方", "mono"], note: "尖刺包络切成横条纹:左边是乱糟糟的多峰声场,越往右越塌,最后只剩正中一根线独自拖出去 —— 进来的是房间,出去的是一根线。全纸灰版。",
      draw: () => plate() + waveTail(PAPER, PAPER) },
    { id: "I2", name: "橙贯穿线", tags: ["你的配方", "本命提名"], note: "同 I1,但把那根从头贯到尾的中线点橙:它就是人声 —— 从噪场里穿过、毫发无损地走出来。小尺寸下 = 灰色毛刺 + 一根橙线,辨识度极高。",
      draw: () => plate() + waveTail(PAPER, ACC) },
    { id: "I3", name: "纸面纹身版", tags: ["最接近参考"], note: "同一几何落回纹身的原生语境:米白纸面 + 墨色条纹,橙线贯穿。像一枚印在纸上的声音戳记。",
      draw: () => plate(OFFW, OFFL) + waveTail(INKD, ACC) },
    { id: "I4", name: "STAR-1 翻转 · 波形星", tags: ["翻转参考直系", "橙中线"], note: "表驱动的严格几何版:左缘每行等步长递进(直线斜边),双峰不对称 —— 主峰偏左高耸、副峰偏右下沉,上下包络也不对称;副峰浮现处形成 Star-1 式的台阶跳变,右侧拖尾变细、错落收进中线。橙色中线带左尖头,贯穿最远。",
      draw: () => {
        // [k, xL, xR, tailEnd|0]:左缘 26/36 等步长直线;右缘 30/20 等步长;
        // 上探 7 行(主峰)、下探 6 行(副峰)= 上下不对称
        const ROWS = [
          [-7, 340, 360, 0], [-6, 324, 376, 0], [-5, 298, 402, 0],
          [-4, 272, 428, 560], [-3, 246, 620, 700], [-2, 220, 650, 764],
          [-1, 194, 680, 832], [0, 168, 710, 884],
          [1, 204, 690, 856], [2, 241, 670, 742], [3, 277, 650, 706],
          [4, 314, 630, 0], [5, 570, 610, 0], [6, 578, 602, 0],
        ];
        const pitch = 40, t = 26, t2 = 12, cy = 512;
        let s = "";
        for (const [k, xL, xR, tail] of ROWS) {
          const y = cy + k * pitch, f = k === 0 ? ACC : PAPER;
          s += rk(xL, y - t / 2, xR - xL, t, f);
          if (tail) s += rk(xR, y - t2 / 2, tail - xR, t2, f);
          if (k === 0) s += rk(140, y - t2 / 2, xL - 140, t2, f); // 左尖头引线
        }
        return plate() + s;
      } },
    { id: "I5", name: "多峰纹身 · 橙轴线", tags: ["47+48+49 合体", "本命提名"], note: "三张参考的合体:贯穿全宽的细橙轴线(47/48),上下各挂一列干净的条纹三角(48),峰形按纹身波形排布(49)—— 主峰在左、副峰逐个衰减向右、每峰上下不对称,右端只剩橙线独自走完。条纹不碰轴线,悬浮出一条静默缝。",
      draw: () => {
        // 每峰 {x, up:[行数,每行半宽步长], dn:[...]};上下行数/步长都不对称
        const PK = [
          { x: 300, up: [8, 21], dn: [6, 25] },
          { x: 520, up: [4, 19], dn: [5, 19] },
          { x: 666, up: [3, 16], dn: [4, 17] },
          { x: 780, up: [2, 15], dn: [1, 14] },
        ];
        const pitch = 38, t = 24, cy = 512;
        let s = rk(140, cy - 8, 744, 16, ACC);
        for (const side of ["up", "dn"]) {
          const maxK = Math.max(...PK.map(p => p[side][0]));
          for (let k = 1; k <= maxK; k++) {
            const iv = PK.filter(p => p[side][0] >= k)
              .map(p => { const hw = p[side][1] * (p[side][0] - k + 1); return [p.x - hw, p.x + hw]; })
              .sort((a, b) => a[0] - b[0]);
            const merged = [];
            for (const [a, b] of iv) {
              const m = merged[merged.length - 1];
              if (m && a <= m[1] + 6) m[1] = Math.max(m[1], b);
              else merged.push([a, b]);
            }
            const y = side === "up" ? cy - k * pitch : cy + k * pitch;
            for (const [a, b] of merged) s += rk(a, y - t / 2, b - a, t, PAPER);
          }
        }
        return plate() + s;
      } },
  ];
})() },

        s += `<rect x="${xs[i]}" y="${517 - h / 2}" width="44" height="${h}" rx="22" fill="${i ? INK : ACC}"${ops[i] ? ` fill-opacity="${ops[i]}"` : ""}/>`;
      });
      return s + `</g>`;
    } },
  { id: "C5", name: "残影 E", tags: ["字标路线"], note: "字母 E 和它的橙色残影错位一拍 —— echo 就是「同一个东西又出现了一次」。字标路线,和波形彻底区分。",
    draw: () => {
      const E = (fill, op, dx) => `<g transform="translate(${dx},0)" fill="${fill}"${op ? ` fill-opacity="${op}"` : ""}>` +
        `<rect x="330" y="272" width="90" height="480" rx="40"/>` +
        `<rect x="330" y="272" width="270" height="90" rx="40"/>` +
        `<rect x="330" y="467" width="220" height="90" rx="40"/>` +
        `<rect x="330" y="662" width="270" height="90" rx="40"/></g>`;
      return plate() + E(ACC, 0.5, 96) + E(PAPER, null, 0);
    } },
]},
{ group: "D · 底板变体 — 同一图形换衣服", items: [
  { id: "D1", name: "纸面浅底", tags: ["浅色 dock 友好"], note: "A1 图形落在纸灰底上,回声用墨色渐隐。在浅色桌面 / 官网上更亮眼,但深色 dock 里会发白发浮。",
    draw: () => plate(PAPBG, "#a9a9a2") + decayBars(ACC, INK, [0.9, 0.6, 0.38, 0.22]) },
  { id: "D2", name: "整橙底", tags: ["最远可认"], note: "整块橙,墨色衰减杠。dock 里一眼锁定,代价是「橙 = 强调色」的克制感没了 —— 它变成了主角。",
    draw: () => plate(ACC, "#d95c24") + decayBars(INK, INK, [0.72, 0.48, 0.3, 0.18]) },
  { id: "D3", name: "正圆底", tags: ["跨平台中性"], note: "A1 图形装进正圆:Linux / web / 社区头像场景更自然,mac dock 里则比圆角方「小一圈」。",
    draw: () => `<circle cx="512" cy="512" r="412" fill="${BG}" stroke="${LINE}" stroke-width="6"/>` +
      `<g transform="translate(512 512) scale(0.84) translate(-512 -512)">${decayBars()}</g>` },
]},
];

const svgOf = (v) => {
  const uid = ++uidc;
  return `<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">${v.draw(uid)}</svg>`;
};

const root = document.getElementById("root");
root.innerHTML = VARIANTS.map(g => `
  <div class="group">
    <div class="gtitle"><span class="no">${g.group.slice(0, 1)}</span>${g.group.slice(4)}</div>
    <div class="grid">
      ${g.items.map(v => `
        <div class="card">
          <div class="dock">
            <div class="lg">${svgOf(v)}</div>
            <div class="col">
              <div class="s64">${svgOf(v)}</div>
              <div class="s32">${svgOf(v)}</div>
              <div class="s16">${svgOf(v)}</div>
            </div>
          </div>
          <div class="cid">${v.id}</div>
          <div class="cname">${v.name}</div>
          <div class="cnote">${v.note}</div>
          <div>${v.tags.map((t, i) => `<span class="tag${i === 0 && (t === "线上" || v.id === "A1") ? " hot" : ""}">${t}</span>`).join("")}</div>
        </div>`).join("")}
    </div>
  </div>`).join("");

document.querySelectorAll(".controls button").forEach(b => {
  b.addEventListener("click", () => {
    document.body.dataset.dock = b.dataset.dock;
    document.querySelectorAll(".controls button").forEach(x => x.classList.toggle("active", x === b));
  });
});
</script>
</body>
</html>
