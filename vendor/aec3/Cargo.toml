# Vendored fork of dignifiedquire/aec3-apm @ aacadf0(Echoless 本地集成,见 ../../../research/aec3_internal_map.md §9)
# 已裁剪:删 cpp/fuzz/aec3-ffi/aec3-sys/aec3-bench(AEC3 链路用不到);改动点见各 crate 内 "Echoless:" 注释。
[workspace]
resolver = "3"
members = [
    "crates/aec3-apm",
    "crates/aec3-common-audio",
    "crates/aec3-core",
    "crates/aec3-agc2",
    "crates/aec3-ns",
    "crates/aec3-simd",
    "crates/aec3-fft",
]

[workspace.package]
edition = "2024"
rust-version = "1.91"
license = "BSD-3-Clause"
repository = "https://github.com/dignifiedquire/aec3-apm"

[workspace.dependencies]
# Internal crates
aec3-apm = { version = "0.1.0", path = "crates/aec3-apm" }
aec3-common-audio = { version = "0.1.0", path = "crates/aec3-common-audio" }
aec3-core = { version = "0.1.0", path = "crates/aec3-core" }
aec3-agc2 = { version = "0.1.0", path = "crates/aec3-agc2" }
aec3-ns = { version = "0.1.0", path = "crates/aec3-ns" }
aec3-simd = { version = "0.1.0", path = "crates/aec3-simd" }
aec3-fft = { version = "0.1.0", path = "crates/aec3-fft" }

# External dependencies
cpufeatures = "0.3"
derive_more = { version = "2", features = ["debug"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
bytemuck = { version = "1", features = ["derive"] }
proptest = "1.11"
test-strategy = "0.4"
criterion = { version = "0.8", features = ["html_reports"] }
anyhow = "1"
clap = { version = "4", features = ["derive"] }
cpal = "0.17"
ctrlc = { version = "3", features = ["termination"] }
hound = "3"
ringbuf = "0.5"

[workspace.lints.rust]
unexpected_cfgs = { level = "deny", check-cfg = ["cfg(docsrs)"] }
elided_lifetimes_in_paths = "warn"
unnameable_types = "warn"
unreachable_pub = "warn"
missing_debug_implementations = "warn"

[workspace.lints.clippy]
or_fun_call = "warn"
use_self = "warn"
unused_async = "warn"
absolute_paths = "warn"
manual_let_else = "warn"
allow_attributes_without_reason = "warn"
mod_module_files = "deny"
# DSP: exact C++ float constants for bit-exact output
excessive_precision = "allow"
# DSP: exact C++ table values near known constants (e.g. PI)
approx_constant = "allow"

# Match C++ optimization level: -O3, LTO, single codegen unit
[profile.release]
lto = "thin"
codegen-units = 1

[profile.bench]
lto = "thin"
codegen-units = 1
debug = true
