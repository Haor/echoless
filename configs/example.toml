# 管线配置示例(CLI 用 TOML;后期 Tauri/GUI 用等价 JSON,映射到同一 PipelineConfig)
#
# 实时跑:echoless run --config configs/example.toml
# 先看设备:echoless devices

mic = "default"          # 麦克风:default / 设备名片段 / 索引
reference = "system"     # far-end 参考:
                         #   system = 默认输出做 loopback(Windows 原生有效)
                         #   none   = 无参考(仅 NS 等单端处理)
                         #   output:<名> / input:<名> / 设备名 / 索引
                         #   macOS 取系统声音需 BlackHole 之类:reference = "input:BlackHole"
output = "default"       # 输出:虚拟麦设备名(Win=VB-Cable / mac=BlackHole),或 default 试听
sample_rate = 48000      # 必须能整除 100(10ms 帧);mic/ref/out 共用此率
frame_ms = 10
reference_channels = "mono" # mono=当前稳定基线;stereo=保留 L/R far reference 供外放对比测试

# 处理链:有序节点 = 串联;单个 = 单开;空 = 直通。kind 之外的键 = 该方案参数。
[[chain]]
kind = "sonora_aec3"
# tail_ms = 120              # echo tail 长度(默认 52ms;外放+房间混响常需更长)
# delay_num_filters = 5      # 延迟搜索窗(默认 5 ≈ 608ms)
# linear_stable_echo_path = false
ns = true                    # 顺带降噪(与 AEC3 同属一个 sonora APM;贴近上游 sonora-aec 默认体感)
ns_level = "moderate"        # low / moderate / high / veryhigh
# agc = false                # AGC2 自动增益

# 可串 LocalVQE:CI artifact 会把 Windows 所需 DLL 与小模型一起放入包内。
# 注意:当前链路边界 SRC 仍是占位线性重采样,LocalVQE 可测真实推理,但不是最终音质版 SRC。
# [[chain]]
# kind = "localvqe"
# model = "models/localvqe-v1.2-1.3M-f32.gguf"
# library = "localvqe.dll"       # Windows artifact 根目录;macOS 用 "liblocalvqe.dylib"
# threads = 2                    # CPU 线程数;0/不填 = 上游 auto
# noise_gate = true
# noise_gate_threshold_dbfs = -45.0
